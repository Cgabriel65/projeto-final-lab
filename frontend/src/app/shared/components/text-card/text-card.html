<div class="text-card">
  <a [routerLink]="['/texts', text.id]">
    <h2>{{ text.title }}</h2>
  </a>
  <p class="genre">{{ text.genre }}</p>
  @if (showAuthor) {
    <p class="author">by <a [routerLink]="['/authors', text.author_id]">{{ text.profiles?.username }}</a></p>
  }
  <p class="date">{{ text.created_at | date:'mediumDate' }}</p>
</div>
